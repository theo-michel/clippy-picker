<!-- Calibration Sidebar -->
<aside class="calib-sidebar" id="calibSidebar">
  <div class="calib-header">
    <span class="calib-title">[CAMERA_CALIBRATION]</span>
    <button class="modal-close" onclick="closeCalibSidebar()">&times;</button>
  </div>

  <div class="calib-body">
    <!-- Status indicators -->
    <div class="calib-status-row">
      <div class="calib-status-item">
        <span class="calib-status-dot" id="calCameraDot"></span>
        <span id="calCameraLabel">SENSOR_OFF</span>
      </div>
      <div class="calib-status-item">
        <span class="calib-status-dot" id="calRobotDot"></span>
        <span id="calRobotLabel">DISCONNECTED</span>
      </div>
    </div>
    <button class="btn btn-sm" id="calBtnStartCam" onclick="calStartCamera()" style="display:none;width:100%;">▸ START SENSOR</button>

    <div class="calib-divider"></div>

    <!-- Capture -->
    <button class="btn btn-primary calib-capture-btn" id="calBtnCapture" onclick="calCapturePoint()">
      ▸ CAPTURE POINT
    </button>
    <button class="btn calib-capture-btn" id="calBtnAuto" onclick="calAutoStart()" style="margin-top:4px;">
      ▸ AUTO CALIBRATE
    </button>
    <div id="calAutoProgress" style="display:none;">
      <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
        <div style="flex:1;height:2px;background:var(--rule);overflow:hidden;">
          <div id="calAutoBar" style="height:100%;width:0%;background:var(--text);transition:width .3s;"></div>
        </div>
        <span id="calAutoLabel" style="font-size:.64rem;font-family:var(--mono);color:var(--text-dim);white-space:nowrap;letter-spacing:0.08em;">0/20</span>
      </div>
      <div id="calAutoMsg" class="status-msg" style="margin-top:4px;"></div>
      <button class="btn btn-sm calib-btn-clear" id="calBtnAutoCancel" onclick="calAutoCancel()" style="width:100%;margin-top:4px;">▸ CANCEL</button>
    </div>
    <div class="calib-point-count">
      <span id="calPointCount">0</span> POINTS
      <span class="calib-point-hint">(&ge;4 REQUIRED · 10+ RECOMMENDED)</span>
    </div>
    <p class="calib-guidance">
      JOG THE ROBOT MANUALLY, OR RUN AUTO_CALIBRATE FOR A SPIRAL SWEEP.
      ARUCO MARKER MUST REMAIN IN FRAME.
    </p>
    <div class="status-msg" id="calCaptureStatus"></div>

    <div class="calib-divider"></div>

    <!-- Points table -->
    <div class="calib-table-wrap" id="calTableWrap">
      <table class="calib-table">
        <thead>
          <tr><th>#</th><th>DELTA (mm)</th><th>CAM (mm)</th><th>ERR</th><th></th></tr>
        </thead>
        <tbody id="calPointsBody"></tbody>
      </table>
    </div>

    <div class="calib-divider"></div>

    <!-- Results -->
    <div id="calResultSection" style="display:none;">
      <div class="calib-rmsd-row">
        <span class="calib-label">RMSD</span>
        <span class="calib-rmsd-badge" id="calRmsdBadge">--</span>
      </div>
      <div class="calib-matrix" id="calMatrix"></div>
      <div class="calib-divider"></div>
    </div>

    <!-- Actions -->
    <div class="calib-actions">
      <button class="btn btn-primary" id="calBtnSolve" onclick="calSolve()" disabled>▸ SOLVE</button>
      <button class="btn" id="calBtnSave" onclick="calSave()" disabled>▸ SAVE</button>
      <button class="btn calib-btn-clear" id="calBtnClear" onclick="calClear()">▸ CLEAR</button>
    </div>
    <div class="status-msg" id="calActionStatus"></div>
  </div>
</aside>

<script>
let calPoints = [];
let calResult = null;

function openCalibSidebar() {
  $('calibSidebar').classList.add('open');
  document.querySelector('.main').classList.add('sidebar-open');
  calLoadState();
  apiPost('/api/camera/overlay', { aruco: true }).catch(() => {});
  setTimeout(() => { setupCanvas(); render(); }, 350);
}
function closeCalibSidebar() {
  $('calibSidebar').classList.remove('open');
  document.querySelector('.main').classList.remove('sidebar-open');
  apiPost('/api/camera/overlay', { aruco: false }).catch(() => {});
  setTimeout(() => { setupCanvas(); render(); }, 350);
}

function calUpdateStatus() {
  const camOn = cameraRunning;
  const camDot = $('calCameraDot'), camLbl = $('calCameraLabel');
  camDot.className = 'calib-status-dot' + (camOn ? ' on' : '');
  camLbl.textContent = camOn ? 'SENSOR_ACTIVE' : 'SENSOR_OFF';
  $('calBtnStartCam').style.display = camOn ? 'none' : '';

  const conn = $('statusDot').classList.contains('connected');
  const robDot = $('calRobotDot'), robLbl = $('calRobotLabel');
  robDot.className = 'calib-status-dot' + (conn ? ' on' : '');
  robLbl.textContent = conn ? 'LINK_ACTIVE' : 'DISCONNECTED';

  const ready = camOn && conn && !calAutoRunning;
  $('calBtnCapture').disabled = !ready;
  $('calBtnAuto').disabled = !ready;
  $('calBtnSolve').disabled = calPoints.length < 4;
  $('calBtnSave').disabled = !calResult;
}

async function calStartCamera() {
  await toggleCamera();
  setTimeout(calUpdateStatus, 500);
}

async function calLoadState() {
  try {
    const data = await apiGet('/api/calibration/state');
    calPoints = data.points || [];
    calResult = data.result || null;
    calRenderPoints();
    calRenderResult();
    calUpdateStatus();
  } catch {}
}

async function calCapturePoint() {
  $('calBtnCapture').disabled = true;
  $('calCaptureStatus').textContent = 'Detecting marker...';
  $('calCaptureStatus').className = 'status-msg busy';
  try {
    const res = await apiPost('/api/calibration/capture');
    if (!res.ok) {
      $('calCaptureStatus').textContent = res.message || 'Capture failed';
      $('calCaptureStatus').className = 'status-msg err';
      $('calBtnCapture').disabled = false;
      return;
    }
    calPoints.push(res.point);
    calResult = null;
    calRenderPoints();
    calRenderResult();
    $('calCaptureStatus').textContent = 'Point #' + calPoints.length + ' captured';
    $('calCaptureStatus').className = 'status-msg ok';
  } catch (e) {
    $('calCaptureStatus').textContent = 'Error: ' + e.message;
    $('calCaptureStatus').className = 'status-msg err';
  }
  calUpdateStatus();
}

async function calRemovePoint(idx) {
  try {
    const res = await apiPost('/api/calibration/remove', { index: idx });
    if (res.ok) {
      calPoints.splice(idx, 1);
      calResult = null;
      calRenderPoints();
      calRenderResult();
      calUpdateStatus();
    }
  } catch {}
}

function calRenderPoints() {
  const tbody = $('calPointsBody');
  $('calPointCount').textContent = calPoints.length;
  if (!calPoints.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-dim);padding:12px;text-transform:uppercase;letter-spacing:0.12em;">NO_POINTS_CAPTURED</td></tr>';
    return;
  }
  const rows = calPoints.map((p, i) => {
    const d = p.d_point.map(v => v.toFixed(0)).join(', ');
    const c = p.c_point.map(v => v.toFixed(0)).join(', ');
    const err = calResult && calResult.residuals ? calResult.residuals[i].toFixed(1) : '--';
    return `<tr>
      <td>${i + 1}</td>
      <td class="mono">${d}</td>
      <td class="mono">${c}</td>
      <td class="mono">${err}</td>
      <td><button class="calib-remove-btn" onclick="calRemovePoint(${i})">&times;</button></td>
    </tr>`;
  });
  tbody.innerHTML = rows.join('');
}

async function calSolve() {
  $('calBtnSolve').disabled = true;
  $('calActionStatus').textContent = 'Running Kabsch...';
  $('calActionStatus').className = 'status-msg busy';
  try {
    const res = await apiPost('/api/calibration/solve');
    if (!res.ok) {
      $('calActionStatus').textContent = res.message || 'Solve failed';
      $('calActionStatus').className = 'status-msg err';
      $('calBtnSolve').disabled = false;
      return;
    }
    calResult = res;
    calRenderPoints();
    calRenderResult();
    $('calActionStatus').textContent = 'Solved — RMSD ' + res.rmsd.toFixed(2) + ' mm';
    $('calActionStatus').className = 'status-msg ok';
  } catch (e) {
    $('calActionStatus').textContent = 'Error: ' + e.message;
    $('calActionStatus').className = 'status-msg err';
  }
  calUpdateStatus();
}

function calRenderResult() {
  const sec = $('calResultSection');
  if (!calResult) { sec.style.display = 'none'; return; }
  sec.style.display = '';

  const badge = $('calRmsdBadge');
  const rmsd = calResult.rmsd;
  badge.textContent = rmsd.toFixed(2) + ' mm';
  badge.className = 'calib-rmsd-badge ' + (rmsd < 3 ? 'good' : rmsd < 5 ? 'warn' : 'bad');

  const R = calResult.R, t = calResult.t;
  const fmt = v => (v >= 0 ? '\u00a0' : '') + v.toFixed(3);
  const rows = R.map((row, i) =>
    `<div class="calib-matrix-row">${row.map(fmt).join('  ')}  ${fmt(t[i])}</div>`
  );
  $('calMatrix').innerHTML = '<div class="calib-label" style="margin-bottom:4px;">D_T_c · (R | t)</div>' + rows.join('');
}

async function calSave() {
  $('calBtnSave').disabled = true;
  try {
    const res = await apiPost('/api/calibration/save');
    if (res.ok) {
      $('calActionStatus').textContent = 'Calibration saved';
      $('calActionStatus').className = 'status-msg ok';
    } else {
      $('calActionStatus').textContent = res.message || 'Save failed';
      $('calActionStatus').className = 'status-msg err';
      $('calBtnSave').disabled = false;
    }
  } catch (e) {
    $('calActionStatus').textContent = 'Error: ' + e.message;
    $('calActionStatus').className = 'status-msg err';
    $('calBtnSave').disabled = false;
  }
}

async function calClear() {
  if (!confirm('Clear all calibration points?')) return;
  try {
    await apiPost('/api/calibration/clear');
    calPoints = [];
    calResult = null;
    calRenderPoints();
    calRenderResult();
    calUpdateStatus();
    $('calCaptureStatus').textContent = '';
    $('calActionStatus').textContent = '';
  } catch {}
}

// ── Auto Calibrate ──────────────────────────────────────────────────
let calAutoRunning = false;
let calAutoSource = null;

function calAutoStart() {
  if (calAutoRunning) return;
  calAutoRunning = true;
  calResult = null;

  $('calBtnAuto').disabled = true;
  $('calBtnCapture').disabled = true;
  $('calAutoProgress').style.display = '';
  $('calAutoBar').style.width = '0%';
  $('calAutoLabel').textContent = '0/?';
  $('calAutoMsg').textContent = 'STARTING…';
  $('calAutoMsg').className = 'status-msg busy';

  calAutoSource = new EventSource('/api/calibration/auto');

  calAutoSource.onmessage = (ev) => {
    const d = JSON.parse(ev.data);
    if (d.type === 'moving') {
      $('calAutoBar').style.width = ((d.index / d.total) * 100) + '%';
      $('calAutoLabel').textContent = d.index + '/' + d.total;
      $('calAutoMsg').textContent = 'MOVING → (' + d.target.join(', ') + ')';
      $('calAutoMsg').className = 'status-msg busy';
    } else if (d.type === 'captured') {
      calPoints.push(d.point);
      calRenderPoints();
      $('calAutoBar').style.width = (((d.index + 1) / d.total) * 100) + '%';
      $('calAutoLabel').textContent = (d.index + 1) + '/' + d.total;
      $('calAutoMsg').textContent = 'CAPTURED #' + d.num_points;
      $('calAutoMsg').className = 'status-msg ok';
    } else if (d.type === 'skip') {
      $('calAutoMsg').textContent = 'SKIP · ' + (d.message || '').toUpperCase();
      $('calAutoMsg').className = 'status-msg err';
    } else if (d.type === 'done') {
      calAutoFinish('DONE · ' + d.num_points + ' POINTS CAPTURED', true);
    } else if (d.type === 'cancelled') {
      calAutoFinish('CANCELLED', false);
    } else if (d.type === 'error') {
      calAutoFinish((d.message || '').toUpperCase(), false);
    }
  };

  calAutoSource.onerror = () => {
    calAutoFinish('CONNECTION_LOST', false);
  };
}

function calAutoFinish(msg, ok) {
  calAutoRunning = false;
  if (calAutoSource) { calAutoSource.close(); calAutoSource = null; }
  $('calBtnAuto').disabled = false;
  $('calAutoMsg').textContent = msg;
  $('calAutoMsg').className = 'status-msg ' + (ok ? 'ok' : 'err');
  $('calAutoBar').style.width = ok ? '100%' : $('calAutoBar').style.width;
  setTimeout(() => { $('calAutoProgress').style.display = 'none'; }, 4000);
  calRenderResult();
  calUpdateStatus();
}

async function calAutoCancel() {
  try { await apiPost('/api/calibration/auto/cancel'); } catch {}
}

window.addEventListener('load', () => {
  setInterval(() => {
    if ($('calibSidebar').classList.contains('open')) calUpdateStatus();
  }, 1000);
});
</script>
