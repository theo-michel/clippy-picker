<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Picker — Calibration</title>
<style>
:root {
  --bg:          #0f1117;
  --bg-card:     #1a1d27;
  --bg-input:    #252836;
  --bg-hover:    #2c3040;
  --border:      #2e3247;
  --text:        #e4e6f0;
  --text-dim:    #8b8fa3;
  --accent:      #6c8cff;
  --accent-glow: rgba(108,140,255,.25);
  --green:       #4ade80;
  --green-dim:   rgba(74,222,128,.15);
  --red:         #f87171;
  --red-dim:     rgba(248,113,113,.15);
  --orange:      #fb923c;
  --yellow:      #facc15;
  --radius:      10px;
  --shadow:      0 2px 12px rgba(0,0,0,.35);
  --font:        'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono:        'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
  --axis-x:      #f87171;
  --axis-y:      #4ade80;
  --axis-z:      #60a5fa;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
  overflow-x: hidden;
}

/* Top Bar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 24px;
  background: var(--bg-card); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.logo { font-size: 1.1rem; font-weight: 700; letter-spacing: .5px; color: var(--accent); text-decoration: none; }
.logo:hover { opacity: .85; }
.nav-sep { color: var(--text-dim); font-weight: 300; }
.nav-label { font-size: .9rem; color: var(--text); font-weight: 600; }
.status-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--red); transition: background .3s;
}
.status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
.status-dot.moving { background: var(--orange); box-shadow: 0 0 8px var(--orange); animation: pulse 1s infinite; }
.status-label { font-size: .82rem; color: var(--text-dim); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.topbar-right { display: flex; align-items: center; gap: 10px; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg-input); color: var(--text);
  font-size: .85rem; font-family: var(--font); cursor: pointer;
  transition: background .15s, border-color .15s; white-space: nowrap;
}
.btn:hover { background: var(--bg-hover); border-color: var(--accent); }
.btn:active { transform: scale(.97); }
.btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-accent:hover { background: #5a7aee; }
.btn-green { background: var(--green-dim); color: var(--green); border-color: rgba(74,222,128,.3); }
.btn-red { background: var(--red-dim); color: var(--red); border-color: rgba(248,113,113,.3); }
.btn-sm { padding: 4px 10px; font-size: .78rem; }
.btn-estop {
  background: var(--red); color: #fff; border: 2px solid #dc2626;
  font-weight: 700; font-size: .85rem; padding: 8px 20px; border-radius: 6px;
  text-transform: uppercase; letter-spacing: 1px;
  box-shadow: 0 0 14px rgba(248,113,113,.25);
}
.btn-estop:hover { background: #dc2626; box-shadow: 0 0 24px rgba(248,113,113,.4); }

.reach-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 20px;
  font-size: .78rem; font-weight: 600; letter-spacing: .5px;
  transition: background .2s, color .2s;
}
.reach-badge.ok  { background: var(--green-dim); color: var(--green); }
.reach-badge.err { background: var(--red-dim); color: var(--red); }

/* Layout */
.main { max-width: 1440px; margin: 0 auto; padding: 16px 20px; }

/* Workspace Row */
.workspace-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 16px;
}
@media (max-width: 960px) { .workspace-row { grid-template-columns: 1fr; } }

.pane {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow);
  display: flex; flex-direction: column;
}
.pane-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px; border-bottom: 1px solid var(--border);
}
.pane-title {
  font-size: .78rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--text-dim);
}
.pane-coords {
  font-family: var(--mono); font-size: .78rem; color: var(--text-dim);
}

/* Camera */
.camera-body {
  flex: 1; display: flex; align-items: center; justify-content: center;
  background: #000; position: relative; min-height: 300px;
}
.camera-body img {
  width: 100%; height: 100%; object-fit: contain; display: block;
}
.camera-placeholder {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 12px; color: var(--text-dim);
  font-size: .9rem; width: 100%; height: 100%; min-height: 300px;
}
.camera-placeholder svg {
  width: 48px; height: 48px; opacity: .3;
}

/* XY + Z group */
.xy-z-body {
  flex: 1; display: flex; min-height: 300px;
}
.xy-z-body canvas {
  flex: 1; display: block; cursor: crosshair; touch-action: none;
}

/* Z Lever */
.z-lever-col {
  display: flex; flex-direction: column; align-items: center;
  justify-content: space-between; padding: 12px 6px;
  width: 56px; border-left: 1px solid var(--border);
  gap: 4px;
}
.z-lever-label {
  font-size: .72rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--axis-z);
}
.z-lever-val {
  font-family: var(--mono); font-size: .78rem; color: var(--axis-z);
  text-align: center;
}
.z-lever-tick {
  font-family: var(--mono); font-size: .65rem; color: var(--text-dim);
}
.z-lever {
  writing-mode: vertical-lr; direction: rtl;
  -webkit-appearance: none; appearance: none;
  flex: 1; width: 28px; margin: 4px 0;
  background: transparent; cursor: ns-resize;
}
.z-lever::-webkit-slider-runnable-track {
  width: 5px; border-radius: 3px; background: var(--border);
}
.z-lever::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--axis-z);
  box-shadow: 0 0 6px rgba(96,165,250,.5);
  margin-left: -5px;
}
.z-lever::-moz-range-track {
  width: 5px; border-radius: 3px; background: var(--border);
}
.z-lever::-moz-range-thumb {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--axis-z); border: none; cursor: ns-resize;
}

/* Controls */
.controls {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px;
}
@media (max-width: 960px) { .controls { grid-template-columns: 1fr 1fr; } }
@media (max-width: 640px) { .controls { grid-template-columns: 1fr; } }

.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow);
}
.card-title {
  font-size: .74rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--text-dim); margin-bottom: 12px;
}

/* Position inputs */
.pos-group { display: flex; flex-direction: column; gap: 10px; }
.pos-row { display: flex; align-items: center; gap: 10px; }
.pos-label { font-weight: 700; font-size: .9rem; width: 20px; text-align: center; }
.pos-label.lx { color: var(--axis-x); }
.pos-label.ly { color: var(--axis-y); }
.pos-label.lz { color: var(--axis-z); }
.pos-input {
  width: 80px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-family: var(--mono);
  font-size: .85rem; text-align: center; padding: 5px; outline: none;
}
.pos-input:focus { border-color: var(--accent); }
.pos-unit { font-size: .72rem; color: var(--text-dim); }

/* Angle bars */
.angles-group { display: flex; flex-direction: column; gap: 10px; }
.angle-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; background: var(--bg-input);
  border-radius: 8px; border: 1px solid var(--border);
}
.angle-label { font-weight: 600; font-size: .85rem; color: var(--accent); min-width: 28px; }
.angle-bar-track {
  flex: 1; height: 6px; background: var(--border);
  border-radius: 3px; position: relative; overflow: hidden;
}
.angle-bar-fill {
  position: absolute; height: 100%; border-radius: 3px;
  background: var(--accent); transition: width .15s, left .15s;
}
.angle-value {
  font-family: var(--mono); font-size: .85rem; min-width: 64px; text-align: right;
}

/* Actions */
.actions-col { display: flex; flex-direction: column; gap: 10px; }
.actions-row { display: flex; gap: 8px; flex-wrap: wrap; }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <a class="logo" href="/">PICKER</a>
    <span class="nav-sep">/</span>
    <span class="nav-label">Calibration</span>
    <div class="status-dot" id="statusDot"></div>
    <span class="status-label" id="statusLabel">Disconnected</span>
  </div>
  <div class="topbar-right">
    <span class="reach-badge ok" id="reachBadge">REACHABLE</span>
    <button class="btn btn-green" onclick="sendHome()">Home</button>
    <button class="btn btn-estop" onclick="sendEstop()">E-STOP</button>
  </div>
</header>

<div class="main">

  <!-- Workspace row: Camera + XY pad with Z lever -->
  <div class="workspace-row">

    <!-- Camera pane -->
    <div class="pane">
      <div class="pane-header">
        <span class="pane-title">Camera Feed</span>
        <button class="btn btn-sm" id="btnCamera" onclick="toggleCamera()">Start</button>
      </div>
      <div class="camera-body" id="cameraBody">
        <div class="camera-placeholder" id="cameraPlaceholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9A2.25 2.25 0 0013.5 5.25h-9A2.25 2.25 0 002.25 7.5v9A2.25 2.25 0 004.5 18.75z"/>
          </svg>
          <span id="cameraMsg">Camera off</span>
        </div>
        <img id="cameraFeed" style="display:none;" alt="Camera Feed">
      </div>
    </div>

    <!-- XY workspace + Z lever pane -->
    <div class="pane">
      <div class="pane-header">
        <span class="pane-title">
          Workspace&ensp;
          <span style="color:var(--axis-x)">X</span>&thinsp;/&thinsp;<span style="color:var(--axis-y)">Y</span>
        </span>
        <span class="pane-coords" id="coordsXY"></span>
      </div>
      <div class="xy-z-body">
        <canvas id="canvasXY"></canvas>
        <div class="z-lever-col">
          <span class="z-lever-label">Z</span>
          <span class="z-lever-tick">&minus;80</span>
          <input type="range" class="z-lever" id="sliderZ"
                 min="-400" max="-80" step="1" value="-250"
                 oninput="onZInput(this.value)">
          <span class="z-lever-tick">&minus;400</span>
          <span class="z-lever-val" id="zVal">-250</span>
          <span class="z-lever-tick">mm</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Controls row -->
  <div class="controls">

    <!-- Position -->
    <div class="card">
      <div class="card-title">Position</div>
      <div class="pos-group">
        <div class="pos-row">
          <span class="pos-label lx">X</span>
          <input type="number" class="pos-input" id="inputX" value="0" step="1"
                 onchange="onPosInput('x')">
          <span class="pos-unit">mm</span>
        </div>
        <div class="pos-row">
          <span class="pos-label ly">Y</span>
          <input type="number" class="pos-input" id="inputY" value="0" step="1"
                 onchange="onPosInput('y')">
          <span class="pos-unit">mm</span>
        </div>
        <div class="pos-row">
          <span class="pos-label lz">Z</span>
          <input type="number" class="pos-input" id="inputZ" value="-250" step="1"
                 onchange="onPosInput('z')">
          <span class="pos-unit">mm</span>
        </div>
      </div>
    </div>

    <!-- Angles -->
    <div class="card">
      <div class="card-title">Computed Angles</div>
      <div class="angles-group">
        <div class="angle-row">
          <span class="angle-label">&theta;1</span>
          <div class="angle-bar-track"><div class="angle-bar-fill" id="bar1"></div></div>
          <span class="angle-value" id="angle1">&mdash;</span>
        </div>
        <div class="angle-row">
          <span class="angle-label">&theta;2</span>
          <div class="angle-bar-track"><div class="angle-bar-fill" id="bar2"></div></div>
          <span class="angle-value" id="angle2">&mdash;</span>
        </div>
        <div class="angle-row">
          <span class="angle-label">&theta;3</span>
          <div class="angle-bar-track"><div class="angle-bar-fill" id="bar3"></div></div>
          <span class="angle-value" id="angle3">&mdash;</span>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="card">
      <div class="card-title">Actions</div>
      <div class="actions-col">
        <div class="actions-row">
          <button class="btn btn-accent" onclick="doSend()">Send</button>
          <button class="btn" onclick="centerXY()">Center XY</button>
          <button class="btn btn-green" onclick="sendHome()">Home</button>
        </div>
        <label style="font-size:.82rem;color:var(--text-dim);display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="chkLive" checked>
          <span>Live &mdash; send on drag</span>
        </label>
      </div>
    </div>

  </div>
</div>

<script>
// ================================================================
//  State
// ================================================================
const pos = { x: 0, y: 0, z: -250 };
let geo = { L: 150, l: 268, Fd: 82.5, Ed: 27.3 };
let angles = [null, null, null];
let reachable = true;
let boundary = { outer: [], inner: [], annular: false };
let cameraRunning = false;

const ANGLE_MIN = -21.8;
const ANGLE_MAX = 80.0;
const SQRT3 = Math.sqrt(3);
const XY_RANGE = 180;
const SEND_INTERVAL = 60;

// ================================================================
//  Client-side Inverse Kinematics
// ================================================================
function solveArm(L, l, Fd, Ed, x, y, z) {
  const A2 = l * l - x * x;
  if (A2 < 0) return null;
  const d = y - Ed + Fd;
  const W2 = z * z + d * d;
  const W = Math.sqrt(W2);
  if (W < 1e-6) return null;
  const cosOmega = (W2 + L * L - A2) / (2 * L * W);
  if (Math.abs(cosOmega) > 1) return null;
  const alpha = Math.asin(Math.max(-1, Math.min(1, d / W))) * 180 / Math.PI;
  const omega = Math.acos(cosOmega) * 180 / Math.PI;
  return 90 + alpha - omega;
}

function computeIK(x, y, z) {
  const { L, l, Fd, Ed } = geo;
  const t1 = solveArm(L, l, Fd, Ed, x, y, z);
  if (t1 === null) return null;
  const cos120 = -0.5, sin120 = SQRT3 / 2;
  const t2 = solveArm(L, l, Fd, Ed, x * cos120 - y * sin120, x * sin120 + y * cos120, z);
  if (t2 === null) return null;
  const cos240 = -0.5, sin240 = -SQRT3 / 2;
  const t3 = solveArm(L, l, Fd, Ed, x * cos240 - y * sin240, x * sin240 + y * cos240, z);
  if (t3 === null) return null;
  return [t1, t2, t3];
}

function isReachableAt(x, y, z) {
  const r = computeIK(x, y, z);
  return r !== null && r.every(a => a >= ANGLE_MIN && a <= ANGLE_MAX);
}

// ================================================================
//  Workspace Boundary
// ================================================================
function computeBoundary(z) {
  const N = 72;
  const outer = [], inner = [];
  const originOk = isReachableAt(0, 0, z);

  for (let i = 0; i < N; i++) {
    const angle = 2 * Math.PI * i / N;
    const cx = Math.cos(angle), cy = Math.sin(angle);

    let lastOk = 0;
    for (let r = 5; r <= 250; r += 5) {
      if (isReachableAt(r * cx, r * cy, z)) lastOk = r;
    }
    if (lastOk > 0) {
      let lo = lastOk, hi = lastOk + 10;
      for (let j = 0; j < 14; j++) {
        const mid = (lo + hi) / 2;
        if (isReachableAt(mid * cx, mid * cy, z)) lo = mid; else hi = mid;
      }
      outer.push([lo * cx, lo * cy]);
    }

    if (!originOk) {
      for (let r = 2; r <= 250; r += 2) {
        if (isReachableAt(r * cx, r * cy, z)) {
          let ilo = Math.max(0, r - 2), ihi = r;
          for (let j = 0; j < 14; j++) {
            const mid = (ilo + ihi) / 2;
            if (isReachableAt(mid * cx, mid * cy, z)) ihi = mid; else ilo = mid;
          }
          inner.push([ihi * cx, ihi * cy]);
          break;
        }
      }
    }
  }
  return { outer, inner, annular: !originOk };
}

function updateBoundary() {
  boundary = computeBoundary(pos.z);
}

// ================================================================
//  Canvas Setup
// ================================================================
let canvas, ctx, canvasW, canvasH;
const MARGIN = 32;
let dragging = false;

function setupCanvas() {
  canvas = document.getElementById('canvasXY');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvasW = rect.width;
  canvasH = rect.height;
  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
}

function w2c(wx, wy) {
  const dw = canvasW - 2 * MARGIN, dh = canvasH - 2 * MARGIN;
  return {
    x: MARGIN + (wx + XY_RANGE) / (2 * XY_RANGE) * dw,
    y: MARGIN + (XY_RANGE - wy) / (2 * XY_RANGE) * dh,
  };
}

function c2w(cx, cy) {
  const dw = canvasW - 2 * MARGIN, dh = canvasH - 2 * MARGIN;
  return {
    x: clamp((cx - MARGIN) / dw * 2 * XY_RANGE - XY_RANGE, -XY_RANGE, XY_RANGE),
    y: clamp(XY_RANGE - (cy - MARGIN) / dh * 2 * XY_RANGE, -XY_RANGE, XY_RANGE),
  };
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ================================================================
//  Rendering
// ================================================================
const GRID_STEP = 50;

function render() {
  if (!ctx) return;
  const dw = canvasW - 2 * MARGIN, dh = canvasH - 2 * MARGIN;
  ctx.clearRect(0, 0, canvasW, canvasH);

  // Grid
  ctx.lineWidth = 1;
  for (let v = -XY_RANGE; v <= XY_RANGE; v += GRID_STEP) {
    const p = w2c(v, 0);
    const isOrigin = Math.abs(v) < 0.5;
    ctx.strokeStyle = isOrigin ? 'rgba(248,113,113,.5)' : 'rgba(46,50,71,.7)';
    ctx.beginPath(); ctx.moveTo(p.x, MARGIN); ctx.lineTo(p.x, MARGIN + dh); ctx.stroke();
    ctx.fillStyle = 'rgba(139,143,163,.5)';
    ctx.font = '10px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(v, p.x, canvasH - MARGIN / 4 + 2);
  }
  for (let v = -XY_RANGE; v <= XY_RANGE; v += GRID_STEP) {
    const p = w2c(0, v);
    const isOrigin = Math.abs(v) < 0.5;
    ctx.strokeStyle = isOrigin ? 'rgba(74,222,128,.5)' : 'rgba(46,50,71,.7)';
    ctx.beginPath(); ctx.moveTo(MARGIN, p.y); ctx.lineTo(MARGIN + dw, p.y); ctx.stroke();
    ctx.fillStyle = 'rgba(139,143,163,.5)';
    ctx.font = '10px system-ui, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(v, MARGIN - 6, p.y + 3);
  }

  // Axis labels
  ctx.font = 'bold 12px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'var(--axis-x)';
  ctx.fillText('X', canvasW / 2, canvasH - 2);
  ctx.save();
  ctx.translate(10, canvasH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillStyle = '#4ade80';
  ctx.fillText('Y', 0, 0);
  ctx.restore();

  // Workspace boundary fill
  if (boundary.outer.length > 2) {
    ctx.beginPath();
    let p0 = w2c(boundary.outer[0][0], boundary.outer[0][1]);
    ctx.moveTo(p0.x, p0.y);
    for (let i = 1; i < boundary.outer.length; i++) {
      const p = w2c(boundary.outer[i][0], boundary.outer[i][1]);
      ctx.lineTo(p.x, p.y);
    }
    ctx.closePath();

    if (boundary.annular && boundary.inner.length > 2) {
      const rev = [...boundary.inner].reverse();
      let pi0 = w2c(rev[0][0], rev[0][1]);
      ctx.moveTo(pi0.x, pi0.y);
      for (let i = 1; i < rev.length; i++) {
        const p = w2c(rev[i][0], rev[i][1]);
        ctx.lineTo(p.x, p.y);
      }
      ctx.closePath();
    }

    ctx.fillStyle = 'rgba(108,140,255,.06)';
    ctx.fill('evenodd');

    // Outer outline
    ctx.beginPath();
    p0 = w2c(boundary.outer[0][0], boundary.outer[0][1]);
    ctx.moveTo(p0.x, p0.y);
    for (let i = 1; i < boundary.outer.length; i++) {
      const p = w2c(boundary.outer[i][0], boundary.outer[i][1]);
      ctx.lineTo(p.x, p.y);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(108,140,255,.25)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Inner outline (hole)
    if (boundary.annular && boundary.inner.length > 2) {
      ctx.beginPath();
      const pi0 = w2c(boundary.inner[0][0], boundary.inner[0][1]);
      ctx.moveTo(pi0.x, pi0.y);
      for (let i = 1; i < boundary.inner.length; i++) {
        const p = w2c(boundary.inner[i][0], boundary.inner[i][1]);
        ctx.lineTo(p.x, p.y);
      }
      ctx.closePath();
      ctx.strokeStyle = 'rgba(248,113,113,.3)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Crosshair
  const dot = w2c(pos.x, pos.y);
  const dotColor = reachable ? '#6c8cff' : '#f87171';
  const glowColor = reachable ? 'rgba(108,140,255,.4)' : 'rgba(248,113,113,.4)';

  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = dotColor;
  ctx.globalAlpha = 0.3;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(dot.x, MARGIN); ctx.lineTo(dot.x, MARGIN + dh); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(MARGIN, dot.y); ctx.lineTo(MARGIN + dw, dot.y); ctx.stroke();
  ctx.setLineDash([]);
  ctx.globalAlpha = 1;

  // Glow
  const grad = ctx.createRadialGradient(dot.x, dot.y, 0, dot.x, dot.y, 20);
  grad.addColorStop(0, glowColor);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(dot.x, dot.y, 20, 0, Math.PI * 2); ctx.fill();

  // Dot
  ctx.fillStyle = dotColor;
  ctx.beginPath(); ctx.arc(dot.x, dot.y, 6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(dot.x, dot.y, 2, 0, Math.PI * 2); ctx.fill();

  // Coordinate display
  document.getElementById('coordsXY').innerHTML =
    `<span style="color:#f87171">X=${Math.round(pos.x)}</span>&ensp;` +
    `<span style="color:#4ade80">Y=${Math.round(pos.y)}</span>&ensp;` +
    `<span style="color:#60a5fa">Z=${Math.round(pos.z)}</span>`;
}

// ================================================================
//  Pointer Events (XY canvas drag)
// ================================================================
function getCanvasPos(e) {
  const r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function onPointerDown(e) {
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);
  dragging = true;
  applyPointer(e);
}

function onPointerMove(e) {
  if (!dragging) return;
  e.preventDefault();
  applyPointer(e);
}

function onPointerUp() {
  if (!dragging) return;
  dragging = false;
  scheduleSend(true);
}

function applyPointer(e) {
  const cp = getCanvasPos(e);
  const w = c2w(cp.x, cp.y);
  pos.x = Math.round(w.x);
  pos.y = Math.round(w.y);
  syncInputs();
  updateIK();
  render();
  scheduleSend(false);
}

// ================================================================
//  Z Lever
// ================================================================
function onZInput(val) {
  pos.z = parseInt(val);
  document.getElementById('zVal').textContent = pos.z;
  document.getElementById('inputZ').value = pos.z;
  updateBoundary();
  updateIK();
  render();
  scheduleSend(false);
}

// ================================================================
//  Position Inputs
// ================================================================
function onPosInput(axis) {
  const el = document.getElementById('input' + axis.toUpperCase());
  let v = parseFloat(el.value);
  if (isNaN(v)) v = 0;
  if (axis === 'z') {
    v = clamp(v, -400, -80);
    pos.z = v;
    document.getElementById('sliderZ').value = v;
    document.getElementById('zVal').textContent = v;
    updateBoundary();
  } else {
    v = clamp(v, -XY_RANGE, XY_RANGE);
    pos[axis] = v;
  }
  el.value = Math.round(v);
  syncInputs();
  updateIK();
  render();
  scheduleSend(true);
}

function syncInputs() {
  document.getElementById('inputX').value = Math.round(pos.x);
  document.getElementById('inputY').value = Math.round(pos.y);
  document.getElementById('inputZ').value = Math.round(pos.z);
}

// ================================================================
//  IK & Angle Display
// ================================================================
function updateIK() {
  const result = computeIK(pos.x, pos.y, pos.z);
  if (result && result.every(a => a >= ANGLE_MIN && a <= ANGLE_MAX)) {
    angles = result;
    reachable = true;
  } else {
    angles = [null, null, null];
    reachable = false;
  }
  updateAngleDisplay();
  updateReachBadge();
}

function updateAngleDisplay() {
  for (let i = 0; i < 3; i++) {
    const valEl = document.getElementById('angle' + (i + 1));
    const barEl = document.getElementById('bar' + (i + 1));
    if (angles[i] !== null) {
      valEl.textContent = angles[i].toFixed(1) + '\u00b0';
      valEl.style.color = '';
      const pct = clamp((angles[i] + 90) / 180 * 100, 0, 100);
      barEl.style.left = Math.min(pct, 50) + '%';
      barEl.style.width = Math.abs(pct - 50) + '%';
    } else {
      valEl.innerHTML = '&mdash;';
      valEl.style.color = 'var(--red)';
      barEl.style.width = '0';
    }
  }
}

function updateReachBadge() {
  const b = document.getElementById('reachBadge');
  if (reachable) {
    b.className = 'reach-badge ok';
    b.textContent = 'REACHABLE';
  } else {
    b.className = 'reach-badge err';
    b.textContent = 'UNREACHABLE';
  }
}

function centerXY() {
  pos.x = 0; pos.y = 0;
  syncInputs(); updateIK(); render();
  scheduleSend(true);
}

// ================================================================
//  Server Communication
// ================================================================
let sendTimer = null, lastSendTime = 0;

function scheduleSend(immediate) {
  if (!document.getElementById('chkLive').checked && !immediate) return;
  if (!reachable) return;
  const now = performance.now();
  if (immediate || now - lastSendTime >= SEND_INTERVAL) {
    clearTimeout(sendTimer);
    sendTimer = null;
    doSend();
  } else if (!sendTimer) {
    sendTimer = setTimeout(() => { sendTimer = null; doSend(); },
      SEND_INTERVAL - (now - lastSendTime));
  }
}

async function doSend() {
  lastSendTime = performance.now();
  try {
    await fetch('/api/move_xyz', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ x: pos.x, y: pos.y, z: pos.z }),
    });
  } catch (e) { console.error('move_xyz failed', e); }
}

async function sendHome() {
  pos.x = 0; pos.y = 0; pos.z = -250;
  document.getElementById('sliderZ').value = -250;
  document.getElementById('zVal').textContent = '-250';
  syncInputs(); updateBoundary(); updateIK(); render();
  try {
    await fetch('/api/move_xyz', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ x: 0, y: 0, z: -250 }),
    });
  } catch (e) { console.error(e); }
}

async function sendEstop() {
  try { await fetch('/api/estop', { method: 'POST' }); } catch (e) { console.error(e); }
}

// ================================================================
//  Camera
// ================================================================
async function toggleCamera() {
  const btn = document.getElementById('btnCamera');
  const feed = document.getElementById('cameraFeed');
  const ph = document.getElementById('cameraPlaceholder');
  const msg = document.getElementById('cameraMsg');

  if (cameraRunning) {
    btn.textContent = 'Start';
    feed.style.display = 'none';
    feed.src = '';
    ph.style.display = 'flex';
    msg.textContent = 'Camera off';
    cameraRunning = false;
    try { await fetch('/api/camera/stop', { method: 'POST' }); } catch {}
    return;
  }

  btn.textContent = 'Starting…';
  btn.disabled = true;
  msg.textContent = 'Starting camera…';

  try {
    const res = await fetch('/api/camera/start', { method: 'POST' });
    const data = await res.json();
    if (!data.ok) {
      msg.textContent = data.message || 'Failed to start camera';
      btn.textContent = 'Start';
      btn.disabled = false;
      return;
    }
    cameraRunning = true;
    btn.textContent = 'Stop';
    btn.disabled = false;
    ph.style.display = 'none';
    feed.style.display = 'block';
    feed.src = '/api/camera/feed?' + Date.now();
    feed.onerror = () => {
      if (cameraRunning) {
        feed.style.display = 'none';
        ph.style.display = 'flex';
        msg.textContent = 'Camera feed lost';
      }
    };
  } catch (e) {
    msg.textContent = 'Connection error';
    btn.textContent = 'Start';
    btn.disabled = false;
  }
}

async function checkCameraStatus() {
  try {
    const res = await fetch('/api/camera/status');
    const data = await res.json();
    if (data.running) {
      cameraRunning = true;
      document.getElementById('btnCamera').textContent = 'Stop';
      document.getElementById('cameraPlaceholder').style.display = 'none';
      const feed = document.getElementById('cameraFeed');
      feed.style.display = 'block';
      feed.src = '/api/camera/feed?' + Date.now();
    }
  } catch {}
}

// ================================================================
//  Status Polling
// ================================================================
async function pollState() {
  try {
    const res = await fetch('/api/state');
    const s = await res.json();
    const dot = document.getElementById('statusDot');
    const lbl = document.getElementById('statusLabel');
    dot.className = 'status-dot';
    if (!s.connected) {
      lbl.textContent = 'Disconnected';
    } else if (s.moving) {
      dot.classList.add('connected', 'moving');
      lbl.textContent = 'Moving \u2014 ' + s.port;
    } else {
      dot.classList.add('connected');
      lbl.textContent = 'Idle \u2014 ' + s.port;
    }
  } catch {}
}

// ================================================================
//  Geometry Config (load from server)
// ================================================================
async function loadGeometry() {
  try {
    const res = await fetch('/api/ik_config');
    const data = await res.json();
    geo.L = data.upper_arm;
    geo.l = data.lower_arm;
    geo.Fd = data.Fd;
    geo.Ed = data.Ed;
  } catch {}
}

// ================================================================
//  Resize
// ================================================================
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { setupCanvas(); render(); }, 100);
});

// ================================================================
//  Init
// ================================================================
async function init() {
  await loadGeometry();

  setupCanvas();
  canvas.addEventListener('pointerdown', onPointerDown);
  canvas.addEventListener('pointermove', onPointerMove);
  canvas.addEventListener('pointerup', onPointerUp);
  canvas.addEventListener('pointerleave', onPointerUp);

  updateBoundary();
  syncInputs();
  updateIK();
  render();

  checkCameraStatus();
  setInterval(pollState, 500);
}

window.addEventListener('load', init);
</script>
